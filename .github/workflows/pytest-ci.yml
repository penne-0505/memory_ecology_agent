name: Pytest CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  AGENT_LLM_PROVIDER: mock
  AGENT_DISCORD_ENABLED: "false"
  AGENT_DISCORD_MODE: observe_only
  AGENT_DISCORD_MAX_MODE: observe_only

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run pytest
        run: uv run pytest

      - name: Run deterministic PoC verification
        run: |
          uv run python _evals/scripts/verify_memory_ecology_poc.py \
            --output "$RUNNER_TEMP/memory_ecology_ci_check.json" \
            > "$RUNNER_TEMP/memory_ecology_ci_check.log"
          test -s "$RUNNER_TEMP/memory_ecology_ci_check.json"
